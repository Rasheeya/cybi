<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Identity | Stackly Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            background: #080b12;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .signup-card {
            background: #0f172a;
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: left;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box img {
            height: 48px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }

        .signup-title {
            text-align: center;
            font-family: 'Urbanist', sans-serif;
            font-size: 32px;
            color: #fff;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .form-label {
            display: block;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Two-columns for top row */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Inputs & Select box */
        .input-box {
            width: 100%;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: #b815c7;
        }

        .select-container {
            position: relative;
            margin-bottom: 25px;
        }

        .styled-select {
            width: 100%;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        .styled-select option {
            background-color: #1e293b;
            color: #fff;
            padding: 15px;
        }


        .select-container::after {
            content: '⌄';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #b815c7;
            font-size: 20px;
            pointer-events: none;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 40px;
            cursor: pointer;
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            background: transparent;
            border: 1.5px solid #b815c7;
            color: #b815c7;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Urbanist', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2.5px;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .action-btn:hover {
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .bottom-nav {
            text-align: center;
            color: #fff;
            font-size: 14px;
        }

        .bottom-nav a {
            color: #b815c7;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 500px) {
            body { padding: 40px 15px; }
            .signup-card { padding: 40px 20px; }
            .form-row {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .signup-title { font-size: 26px; }
            .action-btn { font-size: 16px; letter-spacing: 1.5px; }
        }
    </style>
</head>
<body>
    <div class="signup-card reveal">
        <div class="logo-box">
            <img src="asset/white.webp" alt="Stackly">
        </div>
        <h1 class="signup-title">Create Identity</h1>

        <form id="signup-form">
            <div class="form-row">
                <div>
                    <label class="form-label">Full Name</label>
                    <input type="text" class="input-box" placeholder="John Doe" required>
                </div>
                <div>
                    <label class="form-label">Email</label>
                    <input type="email" class="input-box" placeholder="user@domain.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" class="input-box" placeholder="+1 (555) 000-0000" required>
            </div>

            <label class="form-label">Join As</label>
            <div class="select-container">
                <select class="styled-select">
                    <option>Standard Account</option>
                    <option>Security Analyst</option>
                    <option>Partner Org</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="input-box" placeholder="********" required>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="input-box" placeholder="********" required>
            </div>

            <label class="checkbox-container">
                <input type="checkbox" required> I accept Terms & Privacy
            </label>

            <button type="submit" class="action-btn">Create Account</button>
        </form>

        <div class="bottom-nav">
            Already have account? <a href="Log In.html">Log In</a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.action-btn');
            btn.innerText = 'CREATING PROFILE...';
            setTimeout(() => {
                btn.innerText = 'IDENTITY SECURED';
                btn.style.borderColor = '#2ecc71';
                btn.style.color = '#2ecc71';
                setTimeout(() => window.location.href = 'Log In.html', 1500);
            }, 2000);
        });
    </script>
</body>
</html>
