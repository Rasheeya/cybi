<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Log In | Stackly Defense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            background: #080b12;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: #0f172a;
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: left;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box img {
            height: 48px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }

        .login-title {
            text-align: center;
            font-family: 'Urbanist', sans-serif;
            font-size: 32px;
            color: #fff;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .form-label {
            display: block;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Styled Select */
        .select-container {
            position: relative;
            margin-bottom: 25px;
        }

        .styled-select {
            width: 100%;
            background: #0f172a; /* Match card background */
            border: 1.5px solid #b815c7;
            box-shadow: 0 0 15px rgba(184, 21, 199, 0.4);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        .styled-select option {
            background-color: #0f172a;
            color: #fff;
            padding: 15px;
        }


        .select-container::after {
            content: '⌄';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #b815c7;
            font-size: 20px;
            pointer-events: none;
        }

        /* Inputs */
        .input-box {
            width: 100%;
            background: #1e293b;
            border: 1px solid rgba(253, 253, 253, 0.1);
            padding: 14px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 25px;
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: #b815c7;
        }

        .input-box::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .forgot-pass {
            color: #b815c7;
            text-decoration: none;
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            background: transparent;
            border: 1.5px solid #b815c7;
            color: #b815c7;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Urbanist', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2.5px;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .action-btn:hover {
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .bottom-nav {
            text-align: center;
            color: #fff;
            font-size: 14px;
        }

        .bottom-nav a {
            color: #b815c7;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            body { padding: 40px 20px; height: auto; min-height: 100vh; }
            .login-card { padding: 40px 20px; }
            .login-title { font-size: 24px; margin-bottom: 30px; }
            .form-footer { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <div class="login-card reveal">
        <div class="logo-box">
            <img src="asset/white.webp" alt="Stackly">
        </div>
        <h1 class="login-title">Secure Log In</h1>

        <form id="login-form">
            <label class="form-label">Log In As</label>
            <div class="select-container">
                <select class="styled-select">
                    <option>Corporate Client</option>
                    <option>Enterprise Partner</option>
                    <option>Security Analyst</option>
                </select>
            </div>

            <label class="form-label">Email</label>
            <input type="email" class="input-box" placeholder="user@domain.com" required>

            <label class="form-label">Password</label>
            <input type="password" class="input-box" placeholder="********" required>

            <div class="form-footer">
                <label class="remember-me">
                    <input type="checkbox"> Remember
                </label>
                <a href="404.html" class="forgot-pass">Forgot password?</a>
            </div>

            <button type="submit" class="action-btn">Log In</button>
        </form>

        <div class="bottom-nav">
            New user? <a href="signup.html">Create account</a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.action-btn');
            btn.innerText = 'AUTHENTICATING...';
            setTimeout(() => {
                btn.innerText = 'ACCESS GRANTED';
                btn.style.borderColor = '#2ecc71';
                btn.style.color = '#2ecc71';
                setTimeout(() => window.location.href = 'dashborad.html', 1000);
            }, 1500);
        });
    </script>
</body>
</html>
